<style>
  .solar-grid { display:grid; grid-template-columns:1.05fr .95fr; gap:1.2rem; align-items:start; }

  .map-svg svg { width:100%; height:auto; display:block; }
  .pl:focus-visible circle { stroke:var(--accent-2); stroke-width:2; }
  #detail-wrap { position:sticky; top:76px; } @media (max-width:880px){ #detail-wrap { position:static; } }
  .d-head { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; }
  .d-empty { text-align:center; padding:2rem 0; } .d-empty .big { font-size:1.6rem; }

  .d-ang { display:flex; flex-direction:column; } .d-ang .big { font-size:1.9rem; color:var(--accent); }
  .datatable { margin:.6rem 0; }
  .d-nav { display:flex; justify-content:space-between; gap:.6rem; margin-top:1rem; }
  .moons { position:relative; height:46px; margin:.2rem 0; }
  .moons-planet { position:absolute; left:92px; top:50%; width:16px; height:16px; border-radius:50%; transform:translate(-50%,-50%); }
  .moon-dot { position:absolute; top:50%; transform:translate(-50%,-50%); width:11px; height:11px; padding:0; border-radius:50%;
    border:1px solid var(--line); background:var(--muted); cursor:pointer; }
  .moon-dot:hover,.moon-dot:focus-visible { background:var(--accent); }
