<style>
  .modebar{display:flex;gap:.4rem;padding:.45rem clamp(.8rem,3vw,2rem);border-bottom:1px solid var(--line);
    align-items:center;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--muted);padding:.35rem .8rem;font-family:inherit;
    cursor:pointer;font-size:.85rem;white-space:nowrap}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--bg);font-weight:600}
  .modebar .loc{margin-left:auto;color:var(--faint);font-size:.78rem;font-family:"Space Mono",monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:42%}
  .panel-btn{display:none}

  .sky-layout{display:grid;grid-template-columns:292px 1fr;height:calc(100dvh - 108px)}
  .panel{border-right:1px solid var(--line);padding:1rem;overflow-y:auto;background:var(--bg-2)}
  .grp{margin:1rem 0 .35rem;font:600 .7rem "Space Mono",monospace;text-transform:uppercase;
    letter-spacing:.08em;color:var(--accent)}
  .row{display:flex;gap:.4rem;align-items:center;margin:.35rem 0}
  .row input[type=text],.row input[type=search],.row input[type=date],.row input[type=time]{
    flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);padding:.45rem .55rem;font-family:inherit;font-size:.85rem}
  .toggle{display:flex;align-items:center;gap:.5rem;margin:.3rem 0;font-size:.88rem;cursor:pointer}
  .toggle .sw{width:9px;height:9px;border-radius:2px;flex:none}
  #horizon-only{display:block}
  .hint{color:var(--faint);font-size:.75rem;margin:.5rem 0 0;line-height:1.45}
  .hint kbd{background:var(--surface-2);border:1px solid var(--line);border-radius:4px;padding:0 .25rem;
    font-family:"Space Mono",monospace;font-size:.9em}

  /* barre d'écoulement du temps, à la Stellarium */
  .flow{display:flex;gap:.25rem;align-items:center;margin:.4rem 0}
  .flow button{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--ink);
    cursor:pointer;font-size:.85rem;padding:.35rem 0;font-family:inherit}
  .flow button:hover{border-color:var(--accent)}
  .flow button.on{background:var(--accent);color:var(--bg);border-color:transparent}
  .rate{font:.72rem "Space Mono",monospace;color:var(--faint);text-align:center;margin:.1rem 0 0}

  .fiche{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:.7rem .8rem;margin-top:.6rem;font-size:.9rem}
  .fiche h3{margin:0 0 .2rem;font-size:1.02rem}
  .fiche .mono{color:var(--muted);font-size:.78rem;font-family:"Space Mono",monospace}
  .fiche table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:.45rem}
  .fiche td{padding:.18rem 0;border-bottom:1px dashed var(--line);color:var(--faint)}
  .fiche td:last-child{text-align:right;font-family:"Space Mono",monospace;color:var(--muted)}
  .fiche .acts{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
  .fiche .acts .btn{font-size:.76rem;padding:.3rem .55rem}
  .fiche .fphoto{position:relative;margin:.5rem 0;border-radius:9px;overflow:hidden;background:#05070f;aspect-ratio:1/1}
  .fiche .fphoto img{width:100%;height:100%;object-fit:cover;display:block}
  .fiche .fphoto .ld{position:absolute;inset:0;display:grid;place-items:center;color:var(--faint);
    font:.7rem "Space Mono",monospace}

  #skywrap{position:relative;min-width:0;overflow:hidden}
  #skymap{width:100%;height:100%;display:block;outline:none}
  .zoombar{position:absolute;right:.7rem;bottom:2.2rem;display:flex;flex-direction:column;gap:.3rem;z-index:5}
  .zoombar button{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--surface) 82%,transparent);
    border:1px solid var(--line);color:var(--ink);cursor:pointer;font-size:1rem;line-height:1;
    backdrop-filter:blur(6px);font-family:inherit}
  .zoombar button:hover{border-color:var(--accent)}
  /* barre d'état, comme le bandeau bas de Stellarium */
  .statusbar{position:absolute;left:0;right:0;bottom:0;display:flex;gap:.9rem;padding:.28rem .7rem;
    background:color-mix(in srgb,var(--bg) 72%,transparent);backdrop-filter:blur(6px);
    border-top:1px solid var(--line);font:.68rem "Space Mono",monospace;color:var(--faint);
    overflow-x:auto;white-space:nowrap;z-index:4}
  .statusbar b{color:var(--muted);font-weight:400}

  #view-aladin{height:calc(100dvh - 108px)}
  #aladin-lite-div{width:100%;height:100%}
  .al-controls{display:flex;gap:.4rem;flex-wrap:wrap;padding:.5rem clamp(.8rem,3vw,2rem);border-bottom:1px solid var(--line)}
  .al-controls input{flex:1;min-width:110px;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;color:var(--ink);padding:.45rem .55rem;font-family:inherit}
  .al-controls .btn{font-size:.78rem}

  @media (max-width:860px){
    .panel-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.82rem;padding:.35rem .7rem}
    .sky-layout{grid-template-columns:1fr;height:auto}
    #skywrap{height:min(92vw,66dvh)}
    .panel{position:fixed;z-index:50;left:0;right:0;bottom:0;max-height:74dvh;border-right:0;
      border-top:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:var(--shadow);
      transform:translateY(101%);transition:transform .25s ease;padding:.9rem 1rem 1.4rem}
    .panel.open{transform:translateY(0)}
    .panel .drawer-close{display:block;position:sticky;top:0;margin:-.9rem -1rem .4rem;padding:.6rem 1rem;
      background:var(--bg-2);border:0;border-bottom:1px solid var(--line);color:var(--muted);
      width:calc(100% + 2rem);text-align:left;font-family:inherit;font-size:.85rem;cursor:pointer}
    .panel-back{position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.45);border:0}
    .panel-back[hidden]{display:none}
  }
  @media (min-width:861px){ .panel .drawer-close{display:none} .panel-back{display:none} }
</style>
</head>

<div class="modebar">
  <span class="seg" id="mode">
    <button data-m="map" aria-pressed="true" id="m-map" title="Carte tout-le-ciel, zénith au centre">Carte</button>
    <button data-m="horizon" aria-pressed="false" id="m-horizon" title="Vue depuis le sol, façon Stellarium">Horizon</button>
    <button data-m="aladin" aria-pressed="false" id="m-aladin" title="Imagerie réelle (Aladin / CDS)">Atlas</button>
  </span>
  <button class="btn panel-btn" id="panel-btn">⚙ <span id="t-settings">Réglages</span></button>
  <span class="loc" id="loc-label">Paris</span>
</div>

<div class="sky-layout" id="view-map">
  <button class="panel-back" id="panel-back" hidden aria-label="Fermer"></button>
  <aside class="panel" id="panel">
    <button class="drawer-close" id="drawer-close">✕ <span id="t-close">Fermer</span></button>

    <div class="grp" id="g-place">Lieu</div>
    <div class="row"><button class="btn" id="geo">📍 <span id="t-geo">Ma position</span></button></div>
    <div class="row"><input type="text" id="city" placeholder="Ville…" aria-label="Ville">
      <button class="btn primary" id="cityGo">→</button></div>

    <div class="grp" id="g-find">Chercher un objet</div>
    <div class="row"><input type="search" id="find" placeholder="M31, NGC 7000, Orion…" aria-label="Chercher">
      <button class="btn primary" id="findGo">→</button></div>

    <div class="grp" id="g-time">Date & heure</div>
    <div class="row"><input type="date" id="date" aria-label="Date"><input type="time" id="time" aria-label="Heure"></div>
    <div class="flow">
      <button id="f-back" title="−1 h">⏮</button>
      <button id="f-slow" title="Ralentir">⏪</button>
      <button id="f-play" title="Lecture / pause">▶</button>
      <button id="f-fast" title="Accélérer">⏩</button>
      <button id="f-fwd" title="+1 h">⏭</button>
      <button id="f-now" title="Maintenant">⦿</button>
    </div>
    <p class="rate" id="rate"></p>

    <div class="grp" id="g-layers">Calques</div>
    <label class="toggle"><input type="checkbox" id="l-stars" checked> <span id="t-stars">Étoiles</span></label>
    <label class="toggle"><input type="checkbox" id="l-const" checked> <span id="t-const">Constellations</span></label>
    <label class="toggle"><input type="checkbox" id="l-labels" checked> <span id="t-labels">Noms</span></label>
    <label class="toggle"><span class="sw" style="background:#f4c15d"></span><input type="checkbox" id="l-messier" checked> <span id="t-messier">Objets Messier</span></label>
    <label class="toggle"><span class="sw" style="background:#c58cf0"></span><input type="checkbox" id="l-dso"> <span id="t-dso">NGC / IC</span></label>
    <label class="toggle"><input type="checkbox" id="l-planets" checked> <span id="t-planets">Planètes & Lune</span></label>
    <span id="horizon-only">
      <label class="toggle"><input type="checkbox" id="l-atmosphere" checked> <span id="t-atmosphere">Atmosphère</span></label>
      <label class="toggle"><input type="checkbox" id="l-ground" checked> <span id="t-ground">Sol</span></label>
    </span>
    <label class="toggle"><input type="checkbox" id="l-cardinals" checked> <span id="t-cardinals">Points cardinaux</span></label>
    <label class="toggle"><input type="checkbox" id="l-grid"> <span id="t-grid">Grille azimutale</span></label>
    <p class="hint" id="t-dsohint"></p>

    <div id="fiche"></div>
    <p class="hint" id="t-hint"></p>
  </aside>

  <div id="skywrap">
    <canvas id="skymap"></canvas>
    <div class="zoombar">
      <button id="zin" aria-label="Zoom +">+</button>
      <button id="zout" aria-label="Zoom −">−</button>
      <button id="zreset" aria-label="Vue par défaut">⤢</button>
    </div>
    <div class="statusbar" id="status"></div>
  </div>
</div>

<div id="view-aladin" hidden>
  <div class="al-controls">
    <input id="al-q" type="search" placeholder="M31, Orion, NGC 7000…">
    <button class="btn primary" id="al-go">→</button>
    <button class="btn" data-al="P/DSS2/color">DSS2</button>
    <button class="btn" data-al="P/Mellinger/color">Voie lactée</button>
    <button class="btn" data-al="P/2MASS/color">2MASS</button>
  </div>

<script defer src="./assets/vendor/astronomy.browser.min.js"></script>
<script defer src="./assets/js/skymap.js"></script>
<script defer src="./assets/js/skyphoto.js"></script>
<script defer>
document.addEventListener("DOMContentLoaded",()=>{
  const D=window.Despina, lang=()=>D.getLang?D.getLang():"fr";
  const el=id=>document.getElementById(id);
  const TT={fr:{settings:"Réglages",close:"Fermer",geo:"Ma position",
      stars:"Étoiles",const:"Constellations",labels:"Noms",messier:"Objets Messier (110)",dso:"NGC / IC (1300+)",
      planets:"Planètes & Lune",grid:"Grille azimutale",atmosphere:"Atmosphère",ground:"Sol",cardinals:"Points cardinaux",
      place:"Lieu",time:"Date & heure",layers:"Calques",find:"Chercher un objet",
      dsohint:"Le calque NGC/IC s'enrichit quand tu resserres le champ (magnitude 8 → 12).",
      hint:"<b>Carte</b> : tout le ciel d'un coup, zénith au centre, Nord en haut — glisse pour déplacer, molette pour agrandir. <b>Horizon</b> : la vue depuis le sol, façon Stellarium — glisse pour tourner la tête, molette pour changer le champ, <kbd>←↑→↓</kbd>, <kbd>+</kbd>/<kbd>−</kbd>, <kbd>Espace</kbd> pour centrer.",
      selc:"Constellation",selm:"Objet Messier",seld:"Objet NGC / IC",selp:"Système solaire",
      atlas:"Atlas",card:"Fiche",center:"Centrer",photo:"photo…",
      notfound:"Ville introuvable",nf2:"Objet introuvable",below:"Objet sous l'horizon à cette heure",
      mag:"mag",cons:"Constellation",alt:"Hauteur",az:"Azimut",radec:"RA / Dec",culm:"Culmine à",
      circ:"circumpolaire",never:"ne se lève jamais",
      real:"temps réel",frozen:"figé",day:"jour",
      fov:"champ",look:"regard",sun:"Soleil"},
    en:{settings:"Settings",close:"Close",geo:"My location",
      stars:"Stars",const:"Constellations",labels:"Names",messier:"Messier objects (110)",dso:"NGC / IC (1300+)",
      planets:"Planets & Moon",grid:"Azimuthal grid",atmosphere:"Atmosphere",ground:"Ground",cardinals:"Cardinal points",
      place:"Location",time:"Date & time",layers:"Layers",find:"Find an object",
      dsohint:"The NGC/IC layer fills in as you narrow the field (magnitude 8 → 12).",
      hint:"<b>Map</b>: the whole sky at once, zenith centred, North up — drag to pan, wheel to magnify. <b>Horizon</b>: the view from the ground, Stellarium-style — drag to look around, wheel to change the field, <kbd>←↑→↓</kbd>, <kbd>+</kbd>/<kbd>−</kbd>, <kbd>Space</kbd> to centre.",
      selc:"Constellation",selm:"Messier object",seld:"NGC / IC object",selp:"Solar System",
      atlas:"Atlas",card:"Card",center:"Centre",photo:"photo…",
      notfound:"City not found",nf2:"Object not found",below:"Object below the horizon at this time",
      mag:"mag",cons:"Constellation",alt:"Altitude",az:"Azimuth",radec:"RA / Dec",culm:"Culminates at",
      circ:"circumpolar",never:"never rises",
      real:"real time",frozen:"frozen",day:"day",
      fov:"field",look:"looking",sun:"Sun"}};
  const tt=k=>(TT[lang()]||TT.fr)[k];
  const TYPE={GX:{fr:"Galaxie",en:"Galaxy"},OC:{fr:"Amas ouvert",en:"Open cluster"},GC:{fr:"Amas globulaire",en:"Globular cluster"},
    NE:{fr:"Nébuleuse",en:"Nebula"},PN:{fr:"Nébuleuse planétaire",en:"Planetary nebula"},
    SR:{fr:"Rémanent de supernova",en:"Supernova remnant"},GG:{fr:"Groupe de galaxies",en:"Galaxy group"},
    OT:{fr:"Astérisme / autre",en:"Asterism / other"}};

  function labels(){
    ["settings","close","geo","stars","const","labels","messier","dso","planets","grid",
     "atmosphere","ground","cardinals","dsohint"].forEach(k=>{ const e=el("t-"+k); if(e) e.textContent=tt(k); });
    el("t-hint").innerHTML=tt("hint");
    el("g-place").textContent=tt("place"); el("g-time").textContent=tt("time");
    el("g-layers").textContent=tt("layers"); el("g-find").textContent=tt("find");
  }
  labels();

  let sm, sky, CONS_FR={}, loc={lat:48.8566,lon:2.3522,name:"Paris"}, lastSel=null;
  const RATES=[-86400,-3600,-600,-60,-10,-1,1,10,60,600,3600,86400];
  let ri=RATES.indexOf(1);

  const two=n=>String(n).padStart(2,"0");
  const isoD=d=>`${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`;
  const isoT=d=>`${two(d.getHours())}:${two(d.getMinutes())}`;
  function consName(ra,dec){ try{ const c=window.Astronomy.Constellation(ra/15,dec);
      return lang()==="en"?c.name:(CONS_FR[c.symbol]||c.name); }catch(e){ return null; } }
  const fmtRa=ra=>{const h=ra/15,hh=Math.floor(h),mm=Math.floor((h-hh)*60);return `${hh}h${two(mm)}`;};
  const fmtDec=d=>{const s=d<0?"−":"+",a=Math.abs(d);return `${s}${Math.floor(a)}°${two(Math.round((a-Math.floor(a))*60))}′`;};

  // barre d'état + synchro des champs date/heure pendant que le temps s'écoule
  function onView(v){
    el("status").innerHTML =
      `<span><b>${tt("fov")}</b> ${v.fov<1?v.fov.toFixed(2):v.fov.toFixed(1)}°</span>`+
      (v.proj==="stereo"?`<span><b>${tt("look")}</b> az ${v.az.toFixed(0)}° / h ${v.alt.toFixed(0)}°</span>`:"")+
      `<span>${v.date.toLocaleString(lang()==="en"?"en":"fr-FR",{dateStyle:"medium",timeStyle:"short"})}</span>`+
      (v.sunAlt!=null?`<span><b>${tt("sun")}</b> ${v.sunAlt.toFixed(0)}°</span>`:"")+
      `<span>${loc.name}</span>`;
    if (document.activeElement!==el("date")) el("date").value=isoD(v.date);
    if (document.activeElement!==el("time")) el("time").value=isoT(v.date);
    el("f-play").classList.toggle("on", v.playing);
    el("f-play").textContent = v.playing ? "⏸" : "▶";
    el("rate").textContent = !v.playing ? tt("frozen")
      : v.rate===1 ? tt("real")
      : Math.abs(v.rate)===86400 ? (v.rate<0?"−1 ":"1 ")+tt("day")+"/s"
      : "×"+v.rate;
  }

  fetch("./assets/data/sky.json").then(r=>r.json()).then(data=>{
    sky=data; CONS_FR=Object.fromEntries(data.consts.map(c=>[c.d,c.fr]));
    sm=D.SkyMap(el("skymap"),{ data, location:loc, date:new Date(), projection:"allsky",
      layers:{atmosphere:false, ground:false}, onSelect:showFiche, onView });
    setMode("map");
    const go=new URLSearchParams(location.search).get("go");
    if(go){ el("find").value=go; findObj(); }
  }).catch(()=>{ el("skywrap").innerHTML='<p style="color:var(--muted);padding:1rem">Données du ciel indisponibles.</p>'; });

  function showFiche(sel){
    lastSel=sel;
    const f=el("fiche");
    if(!sel){ f.innerHTML=""; return; }
    const pos = sel.alt!=null ? `
      <table>
        <tr><td>${tt("alt")}</td><td>${sel.alt.toFixed(1)}°</td></tr>
        <tr><td>${tt("az")}</td><td>${sel.az.toFixed(1)}°</td></tr>
        <tr><td>${tt("radec")}</td><td>${fmtRa(sel.ra)} / ${fmtDec(sel.dec)}</td></tr>
        ${sel.culm!=null?`<tr><td>${tt("culm")}</td><td>${sel.culm.toFixed(0)}°${sel.circumpolar?" · "+tt("circ"):""}</td></tr>`:""}
      </table>` : "";

    if(sel.kind==="const"){
      f.innerHTML=`<div class="fiche"><span class="eyebrow">${tt("selc")}</span>
        <h3>${lang()==="en"?sel.la:sel.fr}</h3>
        <div class="mono">${sel.la}${sel.gen?" · "+sel.gen:""}</div>
        <div class="acts"><button class="btn" data-cs>${tt("center")}</button>
          <button class="btn" data-atlas="${sel.la}">${tt("atlas")}</button></div></div>`;
    } else if(sel.kind==="planet"){
      f.innerHTML=`<div class="fiche"><span class="eyebrow">${tt("selp")}</span>
        <h3>${sel.name[lang()]}</h3>${pos}
        <div class="acts"><button class="btn" data-cs>${tt("center")}</button></div></div>`;
    } else {
      const alt2 = sel.kind==="messier" ? (sel.alt2||"") : (lang()==="en"?sel.en:sel.fr);
      const cn = sel.cons ? (lang()==="en"?sel.cons:(CONS_FR[sel.cons]||sel.cons)) : consName(sel.ra,sel.dec);
      f.innerHTML=`<div class="fiche"><span class="eyebrow">${sel.kind==="messier"?tt("selm"):tt("seld")}</span>
        <h3>${sel.name}${alt2?` · ${alt2}`:""}</h3>
        <div class="fphoto" id="fphoto"><span class="ld">${tt("photo")}</span></div>
        <div class="mono">${TYPE[sel.type]?TYPE[sel.type][lang()]:sel.type} · ${tt("mag")} ${sel.mag??"—"}${sel.dim?` · ${sel.dim}′`:""}</div>
        ${cn?`<div class="mono">${tt("cons")} : ${cn}</div>`:""}
        ${pos}
        <div class="acts">
          <button class="btn" data-cs>${tt("center")}</button>
          ${sel.kind==="messier"?`<a class="btn" href="./messier.html?go=${encodeURIComponent(sel.name)}">${tt("card")}</a>`:""}
          <button class="btn" data-atlas="${sel.name}">${tt("atlas")}</button>
        </div></div>`;
      const box=f.querySelector("#fphoto");
      if(box && D.photoImg){
        const img=D.photoImg(sel.ra,sel.dec,{dim:sel.dim,size:260,alt:sel.name,onFail:()=>box.remove()});
        img.addEventListener("load",()=>{ const l=box.querySelector(".ld"); if(l) l.remove(); });
        box.appendChild(img);
      }
    }
    f.querySelectorAll("[data-atlas]").forEach(b=>b.addEventListener("click",()=>toAtlas(b.dataset.atlas)));
    f.querySelectorAll("[data-cs]").forEach(b=>b.addEventListener("click",()=>{
      if(!sm.centerSelected()) warn(tt("below"));
    }));
  }

  function findObj(){
    const q=el("find").value.trim(); if(!q||!sky||!sm) return;
    const k=q.toLowerCase().replace(/\s+/g," ");
    const m=sky.messier.find(x=>x[0].toLowerCase()===k || (x[5]||"").toLowerCase()===k);
    if(m){ if(!sm.centerOn(m[1],m[2],12)) return warn(tt("below"));
      sm.select({kind:"messier",name:m[0]}, true); return; }
    const o=sky.dso.find(x=>x[0].toLowerCase()===k || (x[6]||"").toLowerCase()===k || (x[7]||"").toLowerCase()===k);
    if(o){ sm.setLayer("dso",true); el("l-dso").checked=true;
      if(!sm.centerOn(o[1],o[2],8)) return warn(tt("below"));
      sm.select({kind:"dso",name:o[0]}, true); return; }
    const c=sky.consts.find(x=>[x.d,x.la,x.en,x.fr].some(n=>(n||"").toLowerCase()===k));
    if(c){ if(!sm.centerOn(c.pt[0],c.pt[1],45)) return warn(tt("below"));
      sm.select({kind:"const",d:c.d}, true); return; }
    warn(tt("nf2"));
  }
  function warn(msg){ const s=el("status"); s.innerHTML=`<span style="color:var(--accent)">${msg}</span>`;
    setTimeout(()=>{ if(sm) sm.redraw(); },2400); }
  el("findGo").addEventListener("click",findObj);
  el("find").addEventListener("keydown",e=>{ if(e.key==="Enter") findObj(); });

  const setLayer=(id,key)=>el(id).addEventListener("change",e=>sm&&sm.setLayer(key,e.target.checked));
  ["l-stars,stars","l-const,constellations","l-labels,labels","l-messier,messier","l-dso,dso",
   "l-planets,planets","l-grid,grid","l-atmosphere,atmosphere","l-ground,ground","l-cardinals,cardinals"]
    .forEach(s=>{ const [id,k]=s.split(","); setLayer(id,k); });

  el("zin").addEventListener("click",()=>sm&&sm.zoomIn());
  el("zout").addEventListener("click",()=>sm&&sm.zoomOut());
  el("zreset").addEventListener("click",()=>sm&&sm.resetView());

  // ----- écoulement du temps -----
  const shift=h=>{ const s=sm.getState(); sm.setDate(new Date(s.date.getTime()+h*3600000)); };
  el("f-back").addEventListener("click",()=>shift(-1));
  el("f-fwd").addEventListener("click",()=>shift(1));
  el("f-now").addEventListener("click",()=>{ ri=RATES.indexOf(1); sm.setRate(1); sm.pause(); sm.setNow(); });
  el("f-play").addEventListener("click",()=>{ const s=sm.getState(); s.playing?sm.pause():sm.play(true); });
  el("f-slow").addEventListener("click",()=>{ ri=Math.max(0,ri-1); sm.setRate(RATES[ri]); sm.play(true); });
  el("f-fast").addEventListener("click",()=>{ ri=Math.min(RATES.length-1,ri+1); sm.setRate(RATES[ri]); sm.play(true); });
  function applyDT(){
    const dv=el("date").value, tv=el("time").value||"00:00";
    if(!dv) return;
    const [y,mo,d]=dv.split("-").map(Number), [h,mi]=tv.split(":").map(Number);
    sm.setDate(new Date(y,mo-1,d,h,mi));
  }
  el("date").addEventListener("change",applyDT);
  el("time").addEventListener("change",applyDT);


  el("geo").addEventListener("click",()=>{
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(p=>{
      loc={lat:p.coords.latitude,lon:p.coords.longitude,name:lang()==="en"?"My location":"Ma position"};
      if(sm)sm.setLocation(loc.lat,loc.lon,loc.name);
    },()=>warn(lang()==="en"?"Location refused":"Position refusée"));
  });
  function geocode(){
    const q=el("city").value.trim(); if(!q)return;
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=${lang()}`)
      .then(r=>r.json()).then(j=>{ const r=j.results&&j.results[0]; if(!r) return warn(tt("notfound"));
        loc={lat:r.latitude,lon:r.longitude,name:r.name+(r.country_code?" ("+r.country_code+")":"")};
        el("loc-label").textContent=loc.name;
        if(sm)sm.setLocation(loc.lat,loc.lon,loc.name);
      }).catch(()=>warn(tt("notfound")));
  }
  el("cityGo").addEventListener("click",geocode);
  el("city").addEventListener("keydown",e=>{ if(e.key==="Enter")geocode(); });

  const panel=el("panel"), back=el("panel-back");
  function drawer(on){ panel.classList.toggle("open",on); back.hidden=!on; document.body.style.overflow=on?"hidden":""; }
  el("panel-btn").addEventListener("click",()=>drawer(!panel.classList.contains("open")));
  el("drawer-close").addEventListener("click",()=>drawer(false));
  back.addEventListener("click",()=>drawer(false));
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") drawer(false); });
  window.addEventListener("resize",()=>{ if(window.innerWidth>860) drawer(false); });
  document.addEventListener("despina:lang",()=>{ labels(); if(sm){ sm.redraw(); if(lastSel) showFiche(lastSel); } });

  // ----- Atlas Aladin -----
  let aladin=null, aladinLoaded=false;
  function loadAladin(){
    if(aladinLoaded) return; aladinLoaded=true;
    const s=document.createElement("script");
    s.src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js";
    s.onload=()=>{ if(!window.A||!A.init) return;
      A.init.then(()=>{ try{ aladin=A.aladin("#aladin-lite-div",{survey:"P/DSS2/color",fov:60,projection:"SIN",
        cooFrame:"equatorial",showReticle:true,showZoomControl:true,showFullscreenControl:true,
        showLayersControl:true,showCooGridControl:true,showSimbadPointerControl:true,target:"M31"}); }catch(e){} });
    };
    document.body.appendChild(s);
  }
  function toAtlas(name){ setMode("aladin"); loadAladin();
    const t=setInterval(()=>{ if(aladin){ clearInterval(t); try{ aladin.gotoObject(name); }catch(e){} } },300);
    setTimeout(()=>clearInterval(t),8000);
  }
  /* Trois onglets, gardés distincts :
     - "map"     : la carte tout-le-ciel d'origine (zénith au centre, N en haut,
                   loupe) — sans atmosphère ni sol, comme jusqu'à la v0.6 ;
     - "horizon" : la vue depuis le sol, façon Stellarium ;
     - "aladin"  : l'imagerie réelle du CDS. */
  let mode="map";
  function setMode(m){
    mode=m;
    document.querySelectorAll("#mode button").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.m===m)));
    const isSky = m!=="aladin";
    el("view-map").hidden = !isSky; el("view-aladin").hidden = isSky;
    el("panel-btn").style.display = isSky ? "" : "none";
    el("horizon-only").hidden = m!=="horizon";
    if(!isSky){ loadAladin(); if(sm) sm.pause(); return; }
    if(!sm) return;
    if(m==="map"){
      sm.setProjection("allsky");
      sm.setLayer("atmosphere",false); sm.setLayer("ground",false);
    } else {
      sm.setProjection("stereo");
      sm.setLayer("atmosphere", el("l-atmosphere").checked);
      sm.setLayer("ground", el("l-ground").checked);
    }
    sm.resize();
  }
  document.querySelectorAll("#mode button").forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.m)));
  el("al-go").addEventListener("click",()=>{ const q=el("al-q").value.trim(); if(aladin&&q)try{aladin.gotoObject(q);}catch(e){} });
  el("al-q").addEventListener("keydown",e=>{ if(e.key==="Enter"&&aladin)try{aladin.gotoObject(e.target.value.trim());}catch(_){} });
  document.querySelectorAll("[data-al]").forEach(b=>b.addEventListener("click",()=>{ if(aladin)try{aladin.setImageSurvey(b.dataset.al);}catch(e){} }));
});
</script>
</body>
</html>
